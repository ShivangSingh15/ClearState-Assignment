<!-- Styles.html — presentation styling, included by Index.html -->
<style>
:root{
  --ink:#0d1b2a; --ink-2:#1b2a3a; --slate:#41566b; --mute:#7c8da0;
  --line:#e2e8ef; --line-2:#eef2f6; --bg:#f6f8fa; --card:#ffffff;
  --accent:#0a6c74; --accent-2:#0e8a94; --accent-soft:#e6f2f3;
  --pos:#0f7a4d; --neg:#b3401f; --warn:#9a6b00; --warn-soft:#fbf3e0;
  --pub:#0a6c74; --comp:#7c8da0;
  --r:10px; --shadow:0 1px 2px rgba(13,27,42,.04),0 4px 16px rgba(13,27,42,.05);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.numeric{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.wrap{max-width:1240px;margin:0 auto;padding:20px 22px 60px}

/* Header */
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:3px}
.brand h1{font-size:18px;margin:0;font-weight:650;letter-spacing:-.01em}
.brand .sub{color:var(--mute);font-size:12.5px}
.source{font-size:11.5px;color:var(--slate);text-align:right;line-height:1.5}
.source a{color:var(--accent);text-decoration:none}
.source .refresh{margin-top:6px;display:inline-flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--line);border-radius:7px;
  padding:5px 10px;cursor:pointer;color:var(--ink);font-size:11.5px;font-weight:550}
.source .refresh:hover{border-color:var(--accent);color:var(--accent)}
.demo-flag{display:inline-block;margin-left:8px;background:var(--warn-soft);color:var(--warn);
  border:1px solid #ecdcb0;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}

/* Controls */
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--shadow);margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);font-weight:600}
select{appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;
  padding:8px 30px 8px 10px;font:inherit;color:var(--ink);cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%237c8da0' fill='none' stroke-width='1.5'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 11px center}
select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select:disabled{opacity:.5;cursor:not-allowed}

/* Segmented toggles */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
.seg button{border:0;background:#fff;padding:8px 12px;font:inherit;font-size:13px;color:var(--slate);
  cursor:pointer;border-right:1px solid var(--line);font-weight:540}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--ink);color:#fff}
.seg button:hover:not(.on){background:var(--line-2)}
.basis-wrap{display:flex;align-items:center;gap:8px}
.info{width:16px;height:16px;border-radius:50%;border:1px solid var(--mute);color:var(--mute);
  font-size:11px;display:inline-flex;align-items:center;justify-content:center;cursor:help;position:relative;font-weight:700}
.info:hover .tip{display:block}
.tip{display:none;position:absolute;top:22px;left:50%;transform:translateX(-50%);
  width:280px;background:var(--ink);color:#e8eef4;font-size:11.5px;font-weight:400;
  line-height:1.5;padding:10px 12px;border-radius:8px;z-index:30;text-transform:none;letter-spacing:0}
.tip::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-bottom-color:var(--ink);border-top:0}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 16px 14px;box-shadow:var(--shadow);position:relative}
.kpi .k-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);font-weight:600}
.kpi .k-value{font-size:27px;font-weight:640;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi .k-unit{font-size:13px;color:var(--mute);font-weight:500;margin-left:4px}
.kpi .k-meta{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.delta{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:3px}
.delta.pos{color:var(--pos)} .delta.neg{color:var(--neg)} .delta.flat{color:var(--mute)}
.prov{font-size:10px;font-weight:650;text-transform:uppercase;letter-spacing:.05em;
  padding:1px 6px;border-radius:5px}
.prov.published{background:var(--accent-soft);color:var(--pub)}
.prov.computed{background:#eef1f4;color:var(--comp)}
.badge{font-size:10.5px;font-weight:650;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.badge.warn{background:var(--warn-soft);color:var(--warn);border:1px solid #ecdcb0}
.badge.ok{background:#e7f4ec;color:var(--pos)}

/* Panels & charts */
.grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;margin-bottom:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 18px;min-height:120px}
.panel h3{margin:0 0 2px;font-size:14px;font-weight:620}
.panel .p-sub{color:var(--mute);font-size:12px;margin-bottom:12px}
.chart-box{position:relative;height:300px}

/* Table */
.t-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:9px 12px;border-bottom:1px solid var(--line-2);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
thead th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);
  font-weight:600;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
tbody tr:hover{background:var(--line-2)}
td.num{font-variant-numeric:tabular-nums}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:1px}
.status-pill{font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px}
.status-actual{background:#e7f4ec;color:var(--pos)}
.status-reconstructed{background:var(--warn-soft);color:var(--warn)}
.status-partial,.status-incomplete{background:#fdeee9;color:var(--neg)}

/* States */
.state{display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;color:var(--mute);gap:10px}
.state.show{display:flex}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state h4{margin:0;color:var(--ink);font-size:14px}
.state.error h4{color:var(--neg)}
.state button{margin-top:6px;background:var(--ink);color:#fff;border:0;border-radius:8px;
  padding:8px 16px;font:inherit;font-weight:550;cursor:pointer}
.skeleton{background:linear-gradient(90deg,var(--line-2) 25%,#f3f6f9 37%,var(--line-2) 63%);
  background-size:400% 100%;animation:sk 1.4s ease infinite;border-radius:6px}
@keyframes sk{0%{background-position:100% 0}100%{background-position:-100% 0}}

.foot{margin-top:22px;color:var(--mute);font-size:11.5px;text-align:center}
@media(max-width:880px){.grid2{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
